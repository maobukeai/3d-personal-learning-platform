# Recommended High-Performance Production Nginx Configuration
# This config enables HTTP/2 parallel resource loading, static Gzip/Brotli compression,
# and optimal Cache-Control headers to make the first load and refreshes load instantly.

server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com;

    # SSL Certificates (Configure path to your SSL certificate files)
    # ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    
    # SSL Session cache for faster TLS handshakes
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Root directory pointing to Vite's build output (dist/ folder)
    root /var/www/3d-personal-learning-platform/dist;
    index index.html;

    # 1. Enable HTTP/2 Parallel Downloading (Multi-threaded asset streaming)
    # This is enabled natively via the `http2` parameter in the `listen` directives above.

    # 2. Static Compression Serving (No CPU overhead on the server, instant transfer)
    # Serves the pre-compressed .br (Brotli) and .gz (Gzip) files built by Vite.
    # Note: To use brotli_static, ensure your Nginx is compiled with the ngx_brotli module.
    brotli_static on;
    gzip_static on;

    # Fallback dynamic compression if pre-compressed files are missing
    gzip on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # 3. Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    # 4. Long-term Browser Caching for Versioned/Hashed Assets
    # Vite outputs hashed bundles into /static-chunks/.
    location /static-chunks/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        try_files $uri =404;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        try_files $uri =404;
    }

    location /libs/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        try_files $uri =404;
    }

    # 5a. Service Worker — must NEVER be cached so the browser always fetches
    #     the latest version on page load, triggering cache invalidation on deploy.
    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        add_header Service-Worker-Allowed "/";
        try_files $uri =404;
    }

    # 5b. Prevent Caching of index.html to ensure users always get the latest version
    location / {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        try_files $uri $uri/ /index.html;
    }

    # 6. Proxy API requests to Node.js Express server
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering for AI streaming endpoints
        location ~ ^/api/(projects/ai-chat|projects/co-plan-chat|ai/write-assist|admin/mirror/sources) {
            proxy_pass http://127.0.0.1:3001;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_read_timeout 1800s;
        }
    }

    # 7. Proxy Socket.io
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # 8. Serve Uploads folder directly with caching
    location /uploads/ {
        alias /var/www/3d-personal-learning-platform/uploads/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
        try_files $uri =404;
    }
}
