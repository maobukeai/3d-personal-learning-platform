<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link id="favicon-link" rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      (function() {
        try {
          var favicon = localStorage.getItem('platform_favicon');
          if (favicon) {
            var link = document.getElementById('favicon-link');
            if (link) {
              link.href = favicon;
              if (favicon.indexOf('.svg') === -1) {
                link.removeAttribute('type');
              }
            }
          }
        } catch (e) {}
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="no-referrer" />
    <meta name="description" content="3D 个人创意学习平台 — 学习建模、渲染与创作" />
    <title>3D 学习平台</title>
    <!-- Google Fonts: Inter + Noto Sans SC -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet" /></noscript>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
