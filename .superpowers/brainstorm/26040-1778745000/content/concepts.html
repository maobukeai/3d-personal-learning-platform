<h2>工作空间切换器优化：初步构思</h2>
<p class="subtitle">我们现在的切换器已经有了基础功能，但还可以更进一步。你最希望改进哪个方面？</p>

<div class="options" data-multiselect>
  <div class="option" data-choice="visual" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>视觉层次与美化</h3>
      <p>更好的分组（如个人 vs 团队）、平滑的渐变背景、更精致的图标和间距。</p>
    </div>
  </div>
  <div class="option" data-choice="info" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>信息密度与预览</h3>
      <p>在下拉列表中直接显示团队成员数、待办任务数或最新动态，减少点击。</p>
    </div>
  </div>
  <div class="option" data-choice="custom" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>个性化与搜索</h3>
      <p>支持团队自定义头像/Logo，以及在团队较多时的快速搜索过滤功能。</p>
    </div>
  </div>
  <div class="option" data-choice="actions" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>快捷操作</h3>
      <p>在每个列表项旁边添加“设置”或“成员管理”的快速跳转图标。</p>
    </div>
  </div>
</div>
