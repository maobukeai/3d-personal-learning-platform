<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link id="favicon-link" rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      (function() {
        try {
          var favicon = localStorage.getItem('platform_favicon');
          if (favicon) {
            var link = document.getElementById('favicon-link');
            if (link) {
              link.href = favicon;
              if (favicon.indexOf('.svg') === -1) {
                link.removeAttribute('type');
              }
            }
          }
        } catch (e) {}
      })();
    </script>
    <script>
      (function() {
        try {
          // 1. Restore Theme to prevent FOUC (white flash)
          var isSharePage = window.location.pathname.indexOf('/share/') !== -1;
          var theme = localStorage.getItem('theme') || (isSharePage ? 'glass-light' : 'glass-dark');
          var effectiveTheme = theme;
          if (isSharePage) {
            effectiveTheme = 'glass-light';
          } else if (theme === 'glass-auto') {
            var hour = new Date().getHours();
            effectiveTheme = (hour >= 6 && hour < 18) ? 'glass-light' : 'glass-dark';
          }
          
          var root = document.documentElement;
          root.classList.remove('dark', 'theme-glass');
          if (effectiveTheme === 'glass-light') {
            root.classList.add('theme-glass');
          } else if (effectiveTheme === 'glass-dark') {
            root.classList.add('theme-glass', 'dark');
          }

          // 2. Restore Accent Color immediately
          var color = localStorage.getItem('accentColor') || '#2563eb';
          var hex = color.replace('#', '');
          var bigint = parseInt(
            hex.length === 3
              ? hex.split('').map(function(c) { return c + c; }).join('')
              : hex,
            16
          );
          var rgb = isFinite(bigint)
            ? ((bigint >> 16) & 255) + ', ' + ((bigint >> 8) & 255) + ', ' + (bigint & 255)
            : '37, 99, 235';

          root.style.setProperty('--accent', color);
          root.style.setProperty('--accent-rgb', rgb);
        } catch (e) {}
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="no-referrer" />
    <meta name="description" content="3D 个人创意学习平台 — 学习建模、渲染与创作" />
    <title>3D 学习平台</title>
    <!-- Google Fonts: Inter + Noto Sans SC -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" /></noscript>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
